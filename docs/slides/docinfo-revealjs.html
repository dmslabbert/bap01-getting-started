<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/darcula.min.css">
<style>
    .reveal pre,
    .reveal pre code,
    .reveal code.hljs,
    .reveal pre code.hljs {
        background: #2b2b2b !important;
        color: #a9b7c6 !important;
    }

    /* token colours */
    .reveal .hljs-keyword    { color: #cc7832 !important; }
    .reveal .hljs-string     { color: #6a8759 !important; }
    .reveal .hljs-comment    { color: #808080 !important; font-style: italic !important; }
    .reveal .hljs-number     { color: #6897bb !important; }
    .reveal .hljs-class      { color: #ffc66d !important; }
    .reveal .hljs-function   { color: #ffc66d !important; }
    .reveal .hljs-title      { color: #ffc66d !important; }
    .reveal .hljs-type       { color: #ffc66d !important; }
    .reveal .hljs-built_in   { color: #ffc66d !important; }
    .reveal .hljs-literal    { color: #cc7832 !important; }
    .reveal .hljs-variable   { color: #a9b7c6 !important; }
    .reveal .hljs-attr       { color: #a9b7c6 !important; }
    .reveal .hljs-params     { color: #a9b7c6 !important; }
</style>
